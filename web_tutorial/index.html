<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>microGPT and Beyond</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 60px 24px; }
  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 1.15rem;
    color: var(--text-muted);
    margin-bottom: 48px;
    max-width: 600px;
  }
  .lab-list { list-style: none; }
  .lab-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .lab-item:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .lab-item a {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
  }
  .lab-num {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 28px;
    padding-top: 2px;
  }
  .lab-body {
    flex: 1;
    min-width: 0;
  }
  .lab-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
  }
  .lab-tagline {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.45;
  }
</style>
</head>
<body>
<a href="https://github.com/danilop/micro-gpt-and-beyond" class="github-corner" aria-label="View source on GitHub"><svg width="80" height="80" viewBox="0 0 250 250" style="fill:#58a6ff; color:#0d1117; position:absolute; top:0; border:0; right:0;" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"/><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px;" class="octo-arm"/><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"/></svg></a>
<style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>
<div class="container">
  <h1>microGPT and Beyond</h1>
  <p class="tagline">Build a GPT from scratch, one concept at a time, from pure Python to production serving. Inspired by Andrej Karpathy's <a href="https://karpathy.ai/microgpt.html" style="color:var(--accent);text-decoration:none">microGPT</a>.</p>
  <ul class="lab-list" id="labs"></ul>
</div>
<script>
// Try API first (local server), fall back to static bundle (GitHub Pages)
async function loadLabs() {
  try {
    const r = await fetch("/api/labs");
    if (r.ok) return await r.json();
  } catch (e) {}
  // Static fallback
  const r = await fetch("data/labs.json");
  return (await r.json()).map(l => ({id: l.id, title: l.title, tagline: l.tagline}));
}

loadLabs().then(labs => {
  const ul = document.getElementById("labs");
  labs.forEach((lab, i) => {
    const li = document.createElement("li");
    li.className = "lab-item";
    const num = String(i + 1).padStart(2, "0");
    const href = `lab.html?lab=${lab.id}`;
    li.innerHTML = `<a href="${href}">
      <span class="lab-num">${num}</span>
      <div class="lab-body">
        <div class="lab-title">${lab.title}</div>
        <div class="lab-tagline">${lab.tagline}</div>
      </div>
    </a>`;
    ul.appendChild(li);
  });
});
</script>
</body>
</html>
