name: Deploy Web Tutorial

on:
  push:
    branches: [main]
    paths:
      - '*/main.py'
      - '*/microgpt.py'
      - '*/microdiffusion.py'
      - 'web_tutorial/**'

  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build static bundle
        run: python web_tutorial/build_static.py

      - name: Prepare site
        run: |
          mkdir -p _site/data
          cp web_tutorial/index.html web_tutorial/lab.html _site/
          cp web_tutorial/data/labs.json _site/data/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
