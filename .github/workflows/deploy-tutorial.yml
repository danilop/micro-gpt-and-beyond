name: Deploy Web Tutorial

on:
  push:
    branches: [main]
    paths:
      - 'labs/*/main.py'
      - 'labs/*/microgpt.py'
      - 'walk-the-code/**'
      - '.github/workflows/deploy-tutorial.yml'

  workflow_dispatch: # allow manual trigger

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7.1.6

      - name: Install walk-the-code
        run: uv tool install "walk-the-code @ git+https://github.com/danilop/walk-the-code"

      - name: Build static bundle
        run: wtc-build walk-the-code/config.json

      - name: Prepare site
        run: |
          WTC_PYTHON="$(uv tool dir)/walk-the-code/bin/python"
          WTC_ASSETS=$("$WTC_PYTHON" -c "from walk_the_code import ASSETS_DIR; print(ASSETS_DIR)")
          mkdir -p _site/data
          cp "$WTC_ASSETS"/*.html "$WTC_ASSETS"/*.js "$WTC_ASSETS"/*.css "$WTC_ASSETS"/*.svg _site/
          cp walk-the-code/data/labs.json _site/data/
          touch _site/.nojekyll

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory _site \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - uses: actions/upload-artifact@v6.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
